[build]
  command = "pnpm build"
  publish = ".next"
  # These are public Cloudinary configuration values, not secrets
  # They're designed to be exposed in client-side code
  environment = { SECRETS_SCAN_OMIT_KEYS = "CLOUDINARY_CLOUD_NAME,NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET,NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME" }

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"

[[notifications]]
  form_name = "quote"
  [notifications.webhook]
    url = "https://josh.jam-bot.com/social-api/api/leads/webhook/netlify?tenant=josh&site=sprayfoamtv.com"
    events = ["submission_created"]

[[notifications]]
  form_name = "contact"
  [notifications.webhook]
    url = "https://josh.jam-bot.com/social-api/api/leads/webhook/netlify?tenant=josh&site=sprayfoamtv.com"
    events = ["submission_created"]
